<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    width: 220px;
    padding: 16px;
    margin: 0;
  }
  h1 { font-size: 14px; margin: 0 0 10px; }
  .status { font-size: 13px; margin-bottom: 12px; }
  .status.on { color: #2ba84a; }
  .status.off { color: #c82828; }
  button {
    width: 100%;
    background: #1b1b1f;
    color: #fff;
    border: none;
    padding: 8px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <h1>Adult Content Blocker</h1>
  <div class="status" id="status">Loading…</div>
  <button id="openOptions">Manage settings</button>
  <script src="popup.js"></script>
</body>
</html>
